<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartographie des observations</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
</head>

<body>

<div class="map-page">
<h1 class="map-title">Cartographie des observations de hérissons</h1>

<p class="map-description">
Cette carte présente les observations du hérisson d’Europe collectées par les citoyens en Belgique.
Chaque point correspond à un signalement enregistré.
</p>

<div id="controls">
  <b>Filtres :</b><br>
  <label><input type="checkbox" id="myRecensements"> Mes recensements</label><br>
  <label><input type="radio" name="region" value="all" checked> Belgique entière</label>
  <label><input type="radio" name="region" value="wallonie"> Wallonie</label>
  <label><input type="radio" name="region" value="flandre"> Flandre</label>
</div>

<div id="map" style="height: 600px;"></div>

<div class="map-legend">
<b>Légende</b><br><br>
<span class="legend-dot"></span> Observation de hérisson
</div>

<div id="stats"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
  authDomain: "herisson-f80ba.firebaseapp.com",
  projectId: "herisson-f80ba",
  storageBucket: "herisson-f80ba.firebasestorage.app",
  messagingSenderId: "142270421417",
  appId: "1:142270421417:web:cb3abd700fab6731c40cb8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const belgiqueBounds = [[49.5, 2.5], [51.6, 6.4]];
const wallonieBounds = [[49.5,4.5],[50.5,6.4]];
const flandreBounds = [[50.5,2.5],[51.6,5.0]];

function isInside(lat, lon, bounds){
  return lat >= bounds[0][0] && lat <= bounds[1][0] && lon >= bounds[0][1] && lon <= bounds[1][1];
}

const map = L.map('map',{
  maxBounds: belgiqueBounds,
  maxBoundsViscosity:1.0,
  minZoom:7,
  maxZoom:12
}).setView([50.8467,4.3525],8);

L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

const markers = L.markerClusterGroup();
map.addLayer(markers);

let allRecensements = [];

async function loadRecensements(){
  const querySnapshot = await getDocs(collection(db,"recensements"));
  querySnapshot.forEach(doc => {
    const data = doc.data();
    if(data.latitude && data.longitude){
      allRecensements.push(data);
    }
  });
  displayMarkers();
}

function displayMarkers() {
  markers.clearLayers();
  
  const region = document.querySelector('input[name="region"]:checked').value;
  const myRecensements = document.getElementById('myRecensements').checked;
  
  let filtered = allRecensements;

  // Filtrer par région
  if(region === 'wallonie'){
    filtered = filtered.filter(d => isInside(d.latitude,d.longitude, wallonieBounds));
  } else if(region === 'flandre'){
    filtered = filtered.filter(d => isInside(d.latitude,d.longitude, flandreBounds));
  }

  // Filtrer par Mes recensements si coché
  if(myRecensements && auth.currentUser){
    filtered = filtered.filter(d => d.uid === auth.currentUser.uid);
  }

  // Ajout des marqueurs
  filtered.forEach(data => {
    const marker = L.circleMarker([data.latitude, data.longitude], {
      color:'#2e7d32',
      fillColor:'#4CAF50',
      radius:7,
      weight:1.5,
      fillOpacity:0.85
    });
    
    const popupContent = `
      <b>Observation de hérisson</b><br>
      <b>Date :</b> ${data.date}<br>
      <b>État :</b> ${data.etat || 'N/A'}<br>
      <b>Sous-état :</b> ${data.sousEtat || 'N/A'}<br>
      <b>Utilisateur :</b> ${data.username || 'Inconnu'}<br>
      <b>Email :</b> ${data.email || 'Non renseigné'}<br>
      ${data.notes ? `<b>Notes :</b> ${data.notes}` : ''}
    `;
    
    marker.bindPopup(popupContent);
    markers.addLayer(marker);
  });

  document.getElementById("stats").innerHTML = `<b>${filtered.length}</b> observations affichées`;
}

// Écouteurs pour filtrer
document.querySelectorAll('input[name="region"], #myRecensements').forEach(el => {
  el.addEventListener('change', displayMarkers);
});

loadRecensements();
</script>

</body>
</html>
