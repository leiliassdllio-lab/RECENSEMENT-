<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Profil – Hérisson</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container profile-page">

    <section class="profile-header">
      <div class="profile-photo">
        <img id="userPhoto" src="avatar_default.png" alt="Photo de profil">
        <input type="file" id="photoUpload" accept="image/*" style="display:none;">
        <button onclick="document.getElementById('photoUpload').click();">Changer la photo</button>
      </div>

      <div class="profile-info">
        <h2 id="username"></h2>
        <p id="userEmail"></p>
        <button onclick="window.location.href='Cartographie.html';" class="btn">Mes Recensements</button>
      </div>
    </section>

    <section class="profile-badges">
      <h3>Mes Badges</h3>
      <div class="badges-container">

        <div class="badge-box">
          <div class="badge" id="badge-quiz" data-tooltip="Compléter tous les quiz">
            <img src="badge_quiz.png" alt="Badge Quiz">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-quiz"></div>
            </div>
            <span class="progress-text" id="progress-text-quiz">0/1</span>
          </div>
        </div>

        <div class="badge-box">
          <div class="badge" id="badge-1" data-tooltip="Vous devez recenser 1 hérisson pour débloquer ce badge">
            <img src="badge1.png" alt="Badge 1 recensement">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-1"></div>
            </div>
            <span class="progress-text" id="progress-text-1">0/1</span>
          </div>
        </div>

        <div class="badge-box">
          <div class="badge" id="badge-5" data-tooltip="Vous devez recenser 5 hérissons pour débloquer ce badge">
            <img src="badge5.png" alt="Badge 5 recensements">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-5"></div>
            </div>
            <span class="progress-text" id="progress-text-5">0/5</span>
          </div>
        </div>

        <div class="badge-box">
          <div class="badge" id="badge-10" data-tooltip="Vous devez recenser 10 hérissons pour débloquer ce badge">
            <img src="badge10.png" alt="Badge 10 recensements">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-10"></div>
            </div>
            <span class="progress-text" id="progress-text-10">0/10</span>
          </div>
        </div>

        <div class="badge-box">
          <div class="badge" id="badge-photo" data-tooltip="Meilleure photo du mois">
            <img src="badge_photo.png" alt="Meilleure photo">
            <p>Meilleure photo</p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
      authDomain: "herisson-f80ba.firebaseapp.com",
      projectId: "herisson-f80ba",
      storageBucket: "herisson-f80ba.firebasestorage.app",
      messagingSenderId: "142270421417",
      appId: "1:142270421417:web:cb3abd700fab6731c40cb8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const photoInput = document.getElementById('photoUpload');
    const userPhoto = document.getElementById('userPhoto');
    photoInput.addEventListener('change', function() {
      const file = this.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = function(e){
          userPhoto.src = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    });

    async function getRecensementsCount(uid) {
      const q = query(collection(db, "recensements"), where("uid", "==", uid));
      const snapshot = await getDocs(q);
      return snapshot.size;
    }

    function updateRecensementBadges(count) {
      const badgeRecensements = [
        {id: 'badge-1', target: 1},
        {id: 'badge-5', target: 5},
        {id: 'badge-10', target: 10},
      ];

      badgeRecensements.forEach(b => {
        const fill = document.getElementById(`progress-${b.target}`);
        const text = document.getElementById(`progress-text-${b.target}`);
        const badgeEl = document.getElementById(b.id);

        const progress = Math.min(count / b.target, 1);
        fill.style.width = (progress * 100) + "%";
        text.textContent = `${Math.min(count, b.target)}/${b.target}`;

        if(count < b.target){
          badgeEl.classList.add('locked');
          badgeEl.dataset.tooltip = `Vous devez recenser ${b.target} hérissons pour débloquer ce badge`;
        } else {
          badgeEl.classList.remove('locked');
          badgeEl.dataset.tooltip = `Badge débloqué !`;
        }
      });
    }

    async function loadQuizProgress(uid) {
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);

      let quizScores = {};
      if(userSnap.exists()){
        quizScores = userSnap.data().quizScores || {};
      }

      const totalQuizzes = 4;
      let completed = 0;
      for(const q of ['scientifique','comportement','ecologie','sante']){
        if(quizScores[q] === 20) completed++;
      }

      const percent = (completed / totalQuizzes) * 100;
      const quizBadge = document.getElementById('badge-quiz');
      const quizProgress = document.getElementById('progress-quiz');
      const quizText = document.getElementById('progress-text-quiz');

      if(completed === totalQuizzes){
        quizBadge.classList.remove('locked');
        quizProgress.style.width = "100%";
        quizText.textContent = "Terminé";
      } else {
        quizBadge.classList.add('locked');
        quizBadge.dataset.tooltip = "Vous devez terminer tous les quiz pour débloquer ce badge";
        quizProgress.style.width = (percent) + "%";
        quizText.textContent = `${completed}/${totalQuizzes}`;
      }
    }

    onAuthStateChanged(auth, async user => {
      if(!user) return window.location.href = "login.html";
      document.getElementById("userEmail").textContent = user.email || "Non renseigné";
      document.getElementById("username").textContent = localStorage.getItem("username") || "Inconnu";

      const recensementsCount = await getRecensementsCount(user.uid);
      updateRecensementBadges(recensementsCount);
      await loadQuizProgress(user.uid);
    });
  </script>
</body>
</html>
