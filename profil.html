<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon Profil – Hérisson</title>

<style>
html{scroll-behavior:smooth}
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f7f7f7;color:#111}
.container{width:90%;max-width:1000px;margin:auto;padding:40px 0}
h2{color:#4CAF50;text-align:center}
h3{text-align:center;margin-top:40px}
.page-title{text-align:center;color:#4CAF50;margin:0}
.back-box{display:flex;justify-content:center;margin:14px 0 28px}
.back-link{display:inline-block;padding:10px 18px;border-radius:10px;background:#fff;color:#2f4f2f;text-decoration:none;font-weight:bold;border:2px solid #d9e6d9;box-shadow:0 3px 10px rgba(0,0,0,.06);transition:all .3s}
.back-link:hover{background:#f1f7f1;transform:translateY(-2px)}

.profile-header{display:flex;justify-content:center;align-items:center;gap:40px;flex-wrap:wrap;margin-bottom:40px}
.profile-photo{text-align:center}
.profile-photo img{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #4CAF50}
.profile-photo button{margin-top:10px;padding:6px 10px}

.profile-info{text-align:center}

.badges-container{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:20px}
.badge-box{background:#f0f0f0;border-radius:15px;padding:15px;width:110px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,.1)}
.badge img{width:80%}
.progress-bar{background:#e0e0e0;border-radius:10px;height:10px;margin-top:10px}
.progress-fill{background:#4CAF50;height:100%;width:0%;border-radius:10px;transition:width .4s}
.progress-text{font-size:12px;margin-top:5px;color:#555}
.locked{opacity:.4}
/* Tooltip container */
.badge {
  position: relative;
  cursor: pointer;
}

/* Tooltip text */
.badge::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 120%; /* au-dessus du badge */
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 6px 10px;
  border-radius: 5px;
  white-space: nowrap;
  font-size: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 10;
}

/* Flèche du tooltip */
.badge::before {
  content: '';
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  border-width: 5px;
  border-style: solid;
  border-color: rgba(0,0,0,0.75) transparent transparent transparent;
  opacity: 0;
  transition: opacity 0.3s;
}

/* Affiche tooltip au survol */
.badge:hover::after,
.badge:hover::before {
  opacity: 1;
}
</style>
</head>

<body>

<main class="container">
<h1 class="page-title">Mon Profil</h1>
<div class="back-box"><a href="index.html" class="back-link">Retour à l'accueil</a></div>

<section class="profile-header">
<div class="profile-photo">
<img id="userPhoto" src="mon-profil.png">
<input type="file" id="photoUpload" accept="image/*" style="display:none">
<button onclick="document.getElementById('photoUpload').click()">Changer la photo</button>
</div>

<div class="profile-info">
<h2 id="username"></h2>
<p id="userEmail"></p>
<button onclick="window.location.href='Cartographie.html'">Mes Recensements</button>
</div>
</section>

<section class="profile-badges">
<h3>Mes Badges</h3>

<div class="badges-container">

<div class="badge-box"><div class="badge" id="badge-quiz" data-tooltip="Vous devez recenser réussir tous les Quiz">
<img src="badge-quizz.png">
<div class="progress-bar"><div class="progress-fill" id="progress-quiz"></div></div>
<span class="progress-text" id="progress-text-quiz">0/4</span>
</div></div>

<div class="badge-box"><div class="badge" id="badge-1" data-tooltip="Vous devez recenser votre premier hérissons">
<img src="badge1.png">
<div class="progress-bar"><div class="progress-fill" id="progress-1"></div></div>
<span class="progress-text" id="progress-text-1">0/1</span>
</div></div>

<div class="badge-box"><div class="badge" id="badge-5"data-tooltip="Vous devez recenser 5 hérissons">
<img src="badge5.png">
<div class="progress-bar"><div class="progress-fill" id="progress-5"></div></div>
<span class="progress-text" id="progress-text-5">0/5</span>
</div></div>

<div class="badge-box"><div class="badge" id="badge-10"data-tooltip="Vous devez recenser 10 hérissons">
<img src="badge10.png">
<div class="progress-bar"><div class="progress-fill" id="progress-10"></div></div>
<span class="progress-text" id="progress-text-10">0/10</span>
</div></div>

<div class="badge-box"><div class="badge" id="badge-50"data-tooltip="Vous devez recenser 50 hérissons">
<img src="badge50.png">
<div class="progress-bar"><div class="progress-fill" id="progress-50"></div></div>
<span class="progress-text" id="progress-text-50">0/50</span>
</div></div>

<div class="badge-box"><div class="badge" id="badge-100"data-tooltip="Vous devez recenser 100 hérissons">
<img src="badge100.png">
<div class="progress-bar"><div class="progress-fill" id="progress-100"></div></div>
<span class="progress-text" id="progress-text-100">0/100</span>
</div></div>

<div class="badge-box"><div class="badge" id="badge-photo"data-tooltip="Gagnez le concour mensuel de la meilleur photo">
<img src="badge-photo.png">
</div></div>

</div>
</section>
</main>

<script type="module">

import{initializeApp}from"https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import{getFirestore,collection,query,where,getDocs,doc,getDoc}from"https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
authDomain:"herisson-f80ba.firebaseapp.com",
projectId:"herisson-f80ba",
storageBucket:"herisson-f80ba.firebasestorage.app",
messagingSenderId:"142270421417",
appId:"1:142270421417:web:cb3abd700fab6731c40cb8"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

const photoInput=document.getElementById("photoUpload");
const userPhoto=document.getElementById("userPhoto");

photoInput.addEventListener("change",function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=e=>userPhoto.src=e.target.result;
reader.readAsDataURL(file);
}
});

async function getRecensementsCount(uid){
const q=query(collection(db,"recensements"),where("uid","==",uid));
const snapshot=await getDocs(q);
return snapshot.size;
}

function updateRecensementBadges(count){

const badges=[1,5,10,50,100];

badges.forEach(target=>{
const fill=document.getElementById("progress-"+target);
const text=document.getElementById("progress-text-"+target);
const badge=document.getElementById("badge-"+target);
if(!fill||!text||!badge)return;

const progress=Math.min(count/target,1);
fill.style.width=(progress*100)+"%";
text.textContent=Math.min(count,target)+"/"+target;

if(count>=target)badge.classList.remove("locked");
else badge.classList.add("locked");
});
}

async function loadQuizProgress(uid){
const ref=doc(db,"users",uid);
const snap=await getDoc(ref);
if(!snap.exists())return;

const scores=snap.data().quizScores||{};
let completed=0;

const quizzes = ["scientifique","comportement","ecologie","sante"];

quizzes.forEach(q=>{
  if(scores[q] >= 20) completed++;
});

const percent=(completed/quizzes.length)*100;
document.getElementById("progress-quiz").style.width=percent+"%";
document.getElementById("progress-text-quiz").textContent=completed+"/4";

if(completed===quizzes.length)document.getElementById("badge-quiz").classList.remove("locked");
else document.getElementById("badge-quiz").classList.add("locked");
}

onAuthStateChanged(auth,async user=>{
if(!user){window.location.href="login.html";return;}

document.getElementById("userEmail").textContent=user.email;
const userSnap=await getDoc(doc(db,"users",user.uid));
const username=userSnap.exists() ? (userSnap.data().username || "Utilisateur") : (localStorage.getItem("username") || "Utilisateur");
localStorage.setItem("username",username);
document.getElementById("username").textContent=username;

const count=await getRecensementsCount(user.uid);
updateRecensementBadges(count);
await loadQuizProgress(user.uid);
});

</script>
</body>
</html>
