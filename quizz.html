let currentQuiz = [];
let currentQuestion = 0;
let score = 0;
let selectedAnswer = null;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const progressBar = document.getElementById("progress-bar");

function selectQuiz(type){
  currentQuiz = quizzes[type];
  currentQuestion = 0;
  score = 0;
  document.getElementById("quiz-selection").style.display = "none";
  document.getElementById("quiz-container").style.display = "block";
  loadQuestion();
}

function loadQuestion() {
  feedbackEl.textContent = "";
  selectedAnswer = null;
  const q = currentQuiz[currentQuestion];
  questionEl.textContent = `Question ${currentQuestion+1} / ${currentQuiz.length} : ${q.question}`;
  answersEl.innerHTML = "";

  q.answers.forEach((answer,index)=>{
    const btn = document.createElement("button");
    btn.textContent = answer;
    btn.classList.add("btn");
    btn.style.display="block";
    btn.style.margin="10px 0";
    btn.onclick = () => {
      if(selectedAnswer!==null) return;
      selectedAnswer = index;

      q.answers.forEach((a,i)=>{
        const button = answersEl.children[i];
        if(i === q.correct) button.classList.add("correct");
        else if(i === selectedAnswer) button.classList.add("wrong");
      });

      if(selectedAnswer === q.correct) score++;

      setTimeout(()=>{
        currentQuestion++;
        if(currentQuestion < currentQuiz.length){
          loadQuestion();
          updateProgress();
        } else {
          finishQuiz();
        }
      }, 1000);
    };
    answersEl.appendChild(btn);
  });
  updateProgress();
}

function updateProgress(){
  const percent = ((currentQuestion)/currentQuiz.length)*100;
  progressBar.style.width = percent + "%";
}

function finishQuiz(){
  questionEl.textContent="Quiz terminé !";
  answersEl.innerHTML="";
  feedbackEl.textContent=`Votre score : ${score} / ${currentQuiz.length}`;
  progressBar.style.width = "100%";
}
</script>
