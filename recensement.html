<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recense un Hérisson</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body { font-family:'Arial',sans-serif; background:#f7f9f7; margin:0; padding:0; }
header, footer { background:#4CAF50; color:white; text-align:center; padding:10px 0; }
.container { width:90%; max-width:800px; margin:20px auto; background:white; border-radius:10px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.2); position:relative; }
h2 { text-align:center; color:#4CAF50; margin-bottom:20px; }
form p { margin:15px 0 5px; font-weight:bold; }
input, select, textarea, button { width:100%; padding:10px; border-radius:5px; border:1px solid #ccc; box-sizing:border-box; }
button { background:#4CAF50; color:white; font-weight:bold; border:none; cursor:pointer; margin-top:15px; transition:0.3s; }
button:hover { background:#43a047; }
#map { height:300px; border-radius:10px; margin-bottom:20px; }
.icon-label { display:flex; align-items:center; gap:10px; font-weight:normal; }
.icon-label span { font-size:1.5em; }
.tree { position:absolute; font-size:2em; opacity:0.4; }
.tree1 { top:10px; left:10px; }
.tree2 { bottom:10px; right:20px; }
.tree3 { top:50px; right:50px; }
#preview img { max-width:100%; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.2); margin-top:10px; }
#logoutBtn { background:#d32f2f; margin-bottom:20px; }
#logoutBtn:hover { background:#b71c1c; }
</style>
</head>
<body>

<header>
<h1>🦔 Recense un Hérisson</h1>
<div class="container">
  <button id="logoutBtn">Se déconnecter</button>
</div>
</header>

<div class="container">
<div class="tree tree1">🌳</div>
<div class="tree tree2">🌲</div>
<div class="tree tree3">🌳</div>

<h2>Localisation & Observation</h2>
<div id="map"></div>

<form id="recensementForm">
  <p class="icon-label"><span>📍</span> Où avez-vous vu le hérisson ?</p>
  <input type="text" id="lieu" required>

  <p class="icon-label"><span>📅</span> Quand l’avez-vous observé ?</p>
  <input type="date" id="date" required>

  <p class="icon-label"><span>🦔</span> État du hérisson</p>
  
  <div class="choice-grid">
  
  <div class="choice-card" onclick="selectEtat('vivant',this)">
  <img src="images/vivant.png">
  <div>Vivant</div>
  </div>
  
  <div class="choice-card" onclick="selectEtat('mort',this)">
  <img src="images/mort.png">
  <div>Mort</div>
  </div>

  </div>
  
  <input type="hidden" id="etat">
  
  <!-- options vivant -->
  
  <div id="vivantOptions" class="choice-grid" style="display:none;margin-top:15px;">
  
  <div class="choice-card" onclick="selectSousEtat('sain',this)">
  <img src="images/sain.png">
  <div>Bonne santé</div>
  </div>
  
  <div class="choice-card" onclick="selectSousEtat('blesse',this)">
  <img src="images/blesse.png">
  <div>Blessé</div>
  </div>
  
  <div class="choice-card" onclick="selectSousEtat('malade',this)">
  <img src="images/malade.png">
  <div>Malade</div>
  </div>
  
  </div>
  
  <!-- options mort -->
  
  <div id="mortOptions" class="choice-grid" style="display:none;margin-top:15px;">
  
  <div class="choice-card" onclick="selectSousEtat('route',this)">
  <img src="images/route.png">
  <div>Sur route</div>
  </div>
  
  <div class="choice-card" onclick="selectSousEtat('hors_route',this)">
  <img src="images/horsroute.png">
  <div>Hors route</div>
  </div>
  
  </div>
  
  <input type="hidden" id="sousEtat">

  <p class="icon-label"><span>📷</span> Ajouter une image</p>
  <label for="photoUpload" style="display:flex; flex-direction:column; align-items:center; border:2px dashed #4CAF50; padding:15px; border-radius:10px; cursor:pointer;">
    <span style="font-size:2em;">📸</span>
    <span>Cliquer pour choisir ou prendre une photo</span>
  </label>
  <input type="file" id="photoUpload" accept="image/*" capture="environment" style="display:none;">
  <div id="preview"></div>

  <p class="icon-label"><span>📝</span> Notes supplémentaires</p>
  <textarea id="notes" placeholder="Ajoutez vos remarques"></textarea>

  <button type="submit">Envoyer</button>
</form>
</div>

<footer>© <span id="year"></span> – Team Hérisson</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
  authDomain: "herisson-f80ba.firebaseapp.com",
  projectId: "herisson-f80ba",
  storageBucket: "herisson-f80ba.firebasestorage.app",
  messagingSenderId: "142270421417",
  appId: "1:142270421417:web:cb3abd700fab6731c40cb8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔹 Redirection si non connecté
onAuthStateChanged(auth,user=>{
  if(!user) window.location.href="login.html";
});

// 🔹 Bouton déconnexion
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await signOut(auth);
  localStorage.removeItem("username");
  window.location.href="login.html";
});

// 🔹 Date et année
const dateInput = document.getElementById('date');
const today = new Date();
dateInput.value = today.toISOString().slice(0,10);
document.getElementById("year").textContent = today.getFullYear();

// 🔹 Carte et géolocalisation
const map = L.map('map').setView([50.8467,4.3525],13);
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{ attribution:'&copy; OpenStreetMap contributors' }).addTo(map);
let marker;
function updateLieu(lat,lon){ document.getElementById('lieu').value=`Lat:${lat.toFixed(5)}, Lon:${lon.toFixed(5)}`; }
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude, lon=pos.coords.longitude;
    map.setView([lat,lon],15);
    marker=L.marker([lat,lon],{draggable:true}).addTo(map).bindPopup("Votre position actuelle").openPopup();
    updateLieu(lat,lon);
    marker.on('dragend', e=>{ const p=e.target.getLatLng(); updateLieu(p.lat,p.lng); });
  }, err=>{ alert("Impossible de récupérer votre position : "+err.message); });
}
function selectEtat(val,el){

document.getElementById("etat").value=val

document.querySelectorAll(".choice-grid .choice-card").forEach(c=>c.classList.remove("selected"))
el.classList.add("selected")

document.getElementById("vivantOptions").style.display="none"
document.getElementById("mortOptions").style.display="none"

if(val==="vivant"){
document.getElementById("vivantOptions").style.display="grid"
}

if(val==="mort"){
document.getElementById("mortOptions").style.display="grid"
}

}

function selectSousEtat(val,el){

document.getElementById("sousEtat").value=val

el.parentElement.querySelectorAll(".choice-card").forEach(c=>c.classList.remove("selected"))
el.classList.add("selected")

}
// 🔹 Prévisualisation photo
const photoInput = document.getElementById('photoUpload');
const previewDiv = document.getElementById('preview');
photoInput.addEventListener('change', function(){
  const file=this.files[0];
  if(file){ const reader=new FileReader(); reader.onload=e=>previewDiv.innerHTML=`<img src="${e.target.result}">`; reader.readAsDataURL(file);}
});

// 🔹 Soumission formulaire vers Firestore
const form=document.getElementById('recensementForm');
form.addEventListener('submit', async e=>{
  e.preventDefault();
  if(!auth.currentUser) return window.location.href="login.html";

  const recensement={
    uid: auth.currentUser.uid,
    username: localStorage.getItem("username") || "Inconnu",
    lieu: document.getElementById('lieu').value,
    date: dateInput.value,
    methode: document.getElementById('methode').value,
    notes: document.getElementById('notes').value
    etat: document.getElementById("etat").value
    sousEtat: document.getElementById("sousEtat").value,
  };
  if(marker){ const p=marker.getLatLng(); recensement.latitude=p.lat; recensement.longitude=p.lng; }

  try{
    await addDoc(collection(db,"recensements"), recensement);
    form.reset(); previewDiv.innerHTML="";
    if(marker) marker.setLatLng(map.getCenter());
    window.location.href="confirmation.html";
  }catch(err){ console.error(err); alert("Impossible d'enregistrer le recensement."); }
});
</script>

</body>
</html>
