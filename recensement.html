<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recense un Hérisson</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
/* Ton CSS sera chargé séparément */
</style>
</head>

<body>

<!-- AJOUT : bouton mode sombre -->
<button id="darkModeToggle">🌙</button>

<header>
<h1>🦔 Recense un Hérisson</h1>
<div class="container">
  <button id="logoutBtn">Se déconnecter</button>
</div>
</header>

<div class="container">

<div class="tree tree1">🌳</div>
<div class="tree tree2">🌲</div>
<div class="tree tree3">🌳</div>

<h2>Localisation & Observation</h2>

<div style="position:relative;">
    <div id="map"></div>

    <!-- AJOUT : bouton recentrer -->
    <button id="recenterBtn">📍 Recentrer</button>
</div>

<form id="recensementForm">

  <p class="icon-label"><span>📍</span> Où avez-vous vu le hérisson ?</p>
  <input type="text" id="lieu" required>

  <p class="icon-label"><span>📅</span> Quand l’avez-vous observé ?</p>
  <input type="date" id="date" required>

  <p class="icon-label"><span>🦔</span> État du hérisson</p>

  <!-- Choix principal -->
  <div id="etatGrid" class="choice-grid">
    <div class="choice-card" data-etat="vivant">
      <img src="vivant.png"><div>Vivant</div>
    </div>
    <div class="choice-card" data-etat="mort">
      <img src="mort.png"><div>Mort</div>
    </div>
  </div>
  <input type="hidden" id="etat">

  <!-- Options si vivant -->
  <div id="vivantOptions" class="choice-grid" style="display:none;">
    <div class="choice-card" data-sous-etat="sain">
      <img src="images/sain.png"><div>Bonne santé</div>
    </div>
    <div class="choice-card" data-sous-etat="blesse">
      <img src="images/blesse.png"><div>Blessé</div>
    </div>
    <div class="choice-card" data-sous-etat="malade">
      <img src="images/malade.png"><div>Malade</div>
    </div>
  </div>

  <!-- Options si mort -->
  <div id="mortOptions" class="choice-grid" style="display:none;">
    <div class="choice-card" data-sous-etat="route">
      <img src="images/route.png"><div>Sur route</div>
    </div>
    <div class="choice-card" data-sous-etat="hors_route">
      <img src="images/horsroute.png"><div>Hors route</div>
    </div>
  </div>

  <input type="hidden" id="sousEtat">

  <p class="icon-label"><span>📷</span> Ajouter une image</p>
  <label for="photoUpload" style="display:flex; flex-direction:column; align-items:center; border:2px dashed #4CAF50; padding:15px; border-radius:10px; cursor:pointer;">
    <span style="font-size:2em;">📸</span>
    <span>Cliquer pour choisir ou prendre une photo</span>
  </label>
  <input type="file" id="photoUpload" accept="image/*" capture="environment" style="display:none;">
  <div id="preview"></div>

  <p class="icon-label"><span>📝</span> Notes supplémentaires</p>
  <textarea id="notes" placeholder="Ajoutez vos remarques"></textarea>

  <button type="submit">Envoyer</button>
</form>
</div>

<footer>© <span id="year"></span> – Team Hérisson</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
  authDomain: "herisson-f80ba.firebaseapp.com",
  projectId: "herisson-f80ba",
  storageBucket: "herisson-f80ba.firebasestorage.app",
  messagingSenderId: "142270421417",
  appId: "1:142270421417:web:cb3abd700fab6731c40cb8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Redirection si non connecté
onAuthStateChanged(auth,user=>{ if(!user) window.location.href="login.html"; });

// Déconnexion
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await signOut(auth);
  localStorage.removeItem("username");
  window.location.href="login.html";
});

// Date automatique
const dateInput = document.getElementById('date');
const today = new Date();
dateInput.value = today.toISOString().slice(0,10);
document.getElementById("year").textContent = today.getFullYear();

// Carte
const map = L.map('map').setView([50.8467,4.3525],13);
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',{ attribution:'&copy; OpenStreetMap contributors' }).addTo(map);

let marker;
function updateLieu(lat,lon){
  document.getElementById('lieu').value=`Lat:${lat.toFixed(5)}, Lon:${lon.toFixed(5)}`;
}

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude, lon=pos.coords.longitude;
    map.setView([lat,lon],15);
    marker=L.marker([lat,lon],{draggable:true}).addTo(map).bindPopup("Votre position actuelle").openPopup();
    updateLieu(lat,lon);
    marker.on('dragend', e=>{
      const p=e.target.getLatLng();
      updateLieu(p.lat,p.lng);
    });
  }, err=>{ alert("Impossible de récupérer votre position : "+err.message); });
}

/* AJOUT : bouton recentrer */
document.getElementById("recenterBtn").addEventListener("click", () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      map.setView([lat, lon], 15);
      if (marker) marker.setLatLng([lat, lon]);
      updateLieu(lat, lon);
    });
  }
});

/* AJOUT : mode sombre */
const darkBtn = document.getElementById("darkModeToggle");
darkBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  darkBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
});

// --- Gestion état / sous-état ---
const etatInput = document.getElementById("etat");
const sousEtatInput = document.getElementById("sousEtat");
const etatGrid = document.getElementById("etatGrid");
const vivantOptions = document.getElementById("vivantOptions");
const mortOptions = document.getElementById("mortOptions");

// Sélection Vivant / Mort
etatGrid.querySelectorAll(".choice-card").forEach(card => {
  card.addEventListener("click", () => {
    const val = card.dataset.etat;
    etatInput.value = val;

    etatGrid.querySelectorAll(".choice-card").forEach(c =>
      c.classList.remove("selected-main")
    );
    card.classList.add("selected-main");

    sousEtatInput.value = "";
    vivantOptions.style.display = "none";
    mortOptions.style.display = "none";

    vivantOptions.querySelectorAll(".choice-card").forEach(c =>
      c.classList.remove("selected-sub")
    );
    mortOptions.querySelectorAll(".choice-card").forEach(c =>
      c.classList.remove("selected-sub")
    );

    if (val === "vivant") vivantOptions.style.display = "flex";
    if (val === "mort") mortOptions.style.display = "flex";
  });
});

// Sélection sous-état
[vivantOptions, mortOptions].forEach(group => {
  group.querySelectorAll(".choice-card").forEach(card => {
    card.addEventListener("click", () => {
      const val = card.dataset.sousEtat;
      sousEtatInput.value = val;

      group.querySelectorAll(".choice-card").forEach(c =>
        c.classList.remove("selected-sub")
      );
      card.classList.add("selected-sub");
    });
  });
});

// Prévisualisation photo
const photoInput = document.getElementById('photoUpload');
const previewDiv = document.getElementById('preview');
photoInput.addEventListener('change', function(){
  const file=this.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=e=>previewDiv.innerHTML=`<img src="${e.target.result}">`;
    reader.readAsDataURL(file);
  }
});

// Soumission formulaire
const form=document.getElementById('recensementForm');
form.addEventListener('submit', async e=>{
  e.preventDefault();
  if(!auth.currentUser) return window.location.href="login.html";

  const recensement = {
    uid: auth.currentUser.uid,
    username: localStorage.getItem("username") || "Inconnu",
    lieu: document.getElementById('lieu').value,
    date: dateInput.value,
    notes: document.getElementById('notes').value,
    etat: document.getElementById("etat").value,
    sousEtat: document.getElementById("sousEtat").value
  };

  if(marker){
    const p=marker.getLatLng();
    recensement.latitude=p.lat;
    recensement.longitude=p.lng;
  }

  try{
    await addDoc(collection(db,"recensements"), recensement);
    form.reset();
    previewDiv.innerHTML="";
    if(marker) marker.setLatLng(map.getCenter());
    window.location.href="confirmation.html";
  }catch(err){
    console.error(err);
    alert("Impossible d'enregistrer le recensement.");
  }
});
</script>

</body>
</html>
