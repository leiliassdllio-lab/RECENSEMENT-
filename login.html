<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion / Inscription – Team Hérisson</title>
<link rel="stylesheet" href="style.css" />
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background-color: #f7f9f7; }
  header, footer { background-color: #4CAF50; color:white; text-align:center; padding:15px 0; }
  header h1 { margin:0; font-size:1.8em; }
  .container { width:90%; max-width:500px; margin:30px auto; background:white; border-radius:10px; padding:30px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
  h2 { color:#4CAF50; text-align:center; margin-bottom:20px; }
  form { display:flex; flex-direction:column; gap:15px; }
  input { padding:10px; border-radius:5px; border:1px solid #ccc; width:100%; box-sizing:border-box; }
  button { padding:10px; border:none; border-radius:5px; background-color:#4CAF50; color:white; font-weight:bold; cursor:pointer; transition:0.3s; }
  button:hover { background-color:#43a047; }
  .divider { text-align:center; margin:20px 0; font-weight:bold; color:#777; position:relative; }
  .divider::before, .divider::after { content:""; position:absolute; top:50%; width:40%; height:1px; background:#ccc; }
  .divider::before { left:0; }
  .divider::after { right:0; }
  a { color:#4CAF50; text-decoration:none; font-weight:bold; text-align:center; display:block; margin-top:10px; }
</style>
</head>
<body>

<header>
  <h1>🦔 Team Hérisson</h1>
</header>

<div class="container">
  <h2>Créer un compte</h2>
  <form id="signupForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">S'inscrire</button>
  </form>

  <div class="divider">OU</div>

  <h2>Se connecter</h2>
  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Mot de passe" required>
    <button type="submit">Se connecter</button>
  </form>

  <a href="index.html">← Retour à l'accueil</a>
</div>

<footer>
  © <span id="year"></span> – Team Hérisson
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

// --- Config Firebase ---
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  projectId: "TON_PROJECT_ID",
  storageBucket: "TON_PROJECT.appspot.com",
  messagingSenderId: "TON_SENDER_ID",
  appId: "TON_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// --- Affichage année ---
document.getElementById("year").textContent = new Date().getFullYear();

// --- Création de compte ---
document.getElementById("signupForm").addEventListener("submit", e=>{
  e.preventDefault();
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Compte créé !");
      window.location.href = "Recensement.html";
    })
    .catch(err => alert(err.message));
});

// --- Connexion ---
document.getElementById("loginForm").addEventListener("submit", e=>{
  e.preventDefault();
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Connecté !");
      window.location.href = "Recensement.html";
    })
    .catch(err => alert(err.message));
});
</script>

</body>
</html>
