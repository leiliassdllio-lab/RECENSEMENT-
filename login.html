<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion – Hérisson</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
body { display:flex; flex-direction:column; }
.container { background:white; padding:30px; border-radius:18px; box-shadow:0 12px 28px rgba(25,49,29,0.10); width:90%; max-width:420px; text-align:center; border:1px solid #d6e5d4; }
.auth-wrap { width:100%; max-width:460px; margin:0 auto; }
h1 { color:#4CAF50; margin-bottom:20px; }
input { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; box-sizing:border-box; }
button { width:100%; padding:10px; border:none; border-radius:5px; margin-top:10px; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover { opacity:0.9; }
#loginBtn, #createBtn { background-color:#4CAF50; color:white; }
#googleBtn { background-color:#4285F4; color:white; margin-top:10px; }
#googleBtn:hover { background-color:#357ae8; }
p { font-size:0.9em; margin-top:12px; }
a { cursor:pointer; color:#4CAF50; text-decoration:none; }
.error { color:red; margin-top:10px; font-size:0.9em; }
.hidden { display:none; }
.back-box { display:flex; justify-content:center; margin:-4px 0 18px; }
.back-link {
  display:inline-block;
  padding:10px 18px;
  border-radius:10px;
  background:#ffffff;
  color:#2f4f2f;
  text-decoration:none;
  font-weight:bold;
  border:2px solid #d9e6d9;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}
.back-link:hover { background:#f1f7f1; }
</style>
</head>
<body class="site-page">

<!-- Bandeau commun de la page de connexion -->
<header class="site-header">
  <div class="site-header-inner">
  <h1>Connexion</h1>
  <p>Connecte-toi pour recenser, suivre tes progres et retrouver tes observations.</p>
  <div class="back-box"><a href="index.html" class="back-link">Retour à l'accueil</a></div>
  </div>
</header>

<main class="site-main" style="display:flex;justify-content:center;align-items:center;">
<div class="auth-wrap">
<div class="container">
  <!-- Bloc de connexion classique email / mot de passe -->
  <div id="loginDiv">
    <input type="text" id="loginUser" placeholder="Nom d’utilisateur / Email">
    <input type="password" id="loginPass" placeholder="Mot de passe">
    <button id="loginBtn">Se connecter</button>
    <button id="googleBtn">Se connecter avec Google</button>
    <p>Pas encore de compte ? <a id="showSignup">Créer un compte</a></p>
    <div class="error" id="loginError"></div>
  </div>

  <!-- Bloc de création de compte -->
  <div id="signupDiv" class="hidden">
    <h1>Créer un compte</h1>
    <input type="text" id="signupUser" placeholder="Nom d’utilisateur">
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPass" placeholder="Mot de passe">
    <button id="createBtn">Créer votre compte</button>
    <p>Déjà un compte ? <a id="showLogin">Se connecter</a></p>
    <div class="error" id="signupError"></div>
  </div>

</div>
</div>
</main>

<script type="module">
// Authentification Firebase + stockage du profil minimal utilisateur
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc, query, where, getDocs, collection, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyDxCMszTckBP5Zmiaxmo74aVNHiIhUYvys",
  authDomain: "herisson-f80ba.firebaseapp.com",
  projectId: "herisson-f80ba",
  storageBucket: "herisson-f80ba.firebasestorage.app",
  messagingSenderId: "142270421417",
  appId: "1:142270421417:web:cb3abd700fab6731c40cb8"
};

// --- Initialisation ---
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
await setPersistence(auth, browserLocalPersistence);
let isRedirecting = false;

function buildUsernameFromUser(user){
  if(user.displayName && user.displayName.trim()) return user.displayName.trim();
  if(user.email) return user.email.split("@")[0];
  return "Utilisateur";
}

function normalizeUsername(username, fallback = "Utilisateur"){
  const cleanUsername = typeof username === "string" ? username.trim() : "";
  return cleanUsername || fallback;
}

async function getUserProfile(user){
  if(!user) return null;

  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if(userSnap.exists()){
    return userSnap.data();
  }

  if(!user.email) return null;

  return getUserProfileByEmail(user.email);
}

// Recherche du profil utilisateur par email pour garder un username cohérent sur le site
async function getUserProfileByEmail(email){
  const q = query(collection(db,"users"), where("email","==",email));
  const snapshot = await getDocs(q);
  if(snapshot.empty) return null;
  return snapshot.docs[0].data();
}

async function syncUserProfile(user, preferredUsername = ""){
  if(!user) return "Utilisateur";

  const fallbackUsername = buildUsernameFromUser(user);
  const existingProfile = await getUserProfile(user);
  const username = normalizeUsername(preferredUsername || existingProfile?.username, fallbackUsername);
  const profileData = {
    uid: user.uid,
    email: user.email || existingProfile?.email || "",
    username
  };

  await setDoc(doc(db, "users", user.uid), profileData, { merge: true });
  localStorage.setItem("username", username);
  return username;
}

function redirectToRecensement(){
  if(isRedirecting) return;
  isRedirecting = true;
  window.location.replace("recensement1.html");
}

// --- Références DOM principales ---
const loginDiv = document.getElementById("loginDiv");
const signupDiv = document.getElementById("signupDiv");
const loginUser = document.getElementById("loginUser");
const loginPass = document.getElementById("loginPass");
const signupUser = document.getElementById("signupUser");
const signupEmail = document.getElementById("signupEmail");
const signupPass = document.getElementById("signupPass");
const loginError = document.getElementById("loginError");
const signupError = document.getElementById("signupError");

const loginBtn = document.getElementById("loginBtn");
const googleBtn = document.getElementById("googleBtn");
const createBtn = document.getElementById("createBtn");
const showSignup = document.getElementById("showSignup");
const showLogin = document.getElementById("showLogin");

// --- Bascule entre connexion et création de compte ---
showSignup.addEventListener("click", ()=>{ loginDiv.classList.add("hidden"); signupDiv.classList.remove("hidden"); });
showLogin.addEventListener("click", ()=>{ signupDiv.classList.add("hidden"); loginDiv.classList.remove("hidden"); });

// --- Redirection si déjà connecté ---
onAuthStateChanged(auth, async user => {
  if(!user) return;
  try{
    await syncUserProfile(user);
  }catch(error){
    console.error("Impossible de synchroniser le profil utilisateur.", error);
    localStorage.setItem("username", buildUsernameFromUser(user));
  }
  redirectToRecensement();
});

// --- Permettre la connexion via username ou email ---
async function getEmailFromUsername(username){
  const q = query(collection(db,"users"), where("username","==",username));
  const snapshot = await getDocs(q);
  if(!snapshot.empty) return snapshot.docs[0].data().email;
  return null;
}

// --- Connexion email/password ---
loginBtn.addEventListener("click", async ()=>{
  loginError.textContent="";
  try{
    const identifier = loginUser.value.trim();
    const email = identifier.includes("@") ? identifier : await getEmailFromUsername(identifier);
    if(!email){ loginError.textContent="Nom d'utilisateur introuvable"; return; }
    await signInWithEmailAndPassword(auth,email,loginPass.value);
  }catch(e){ loginError.textContent=e.message; }
});

// --- Connexion Google avec création / mise à jour du profil Firestore ---
googleBtn.addEventListener("click", async ()=>{
  loginError.textContent="";
  try{
    await signInWithPopup(auth, provider);
  }catch(e){ loginError.textContent=e.message; }
});

// --- Création d'un compte local dans Firebase Auth + profil dans Firestore ---
createBtn.addEventListener("click", async ()=>{
  signupError.textContent="";
  try{
    const username = normalizeUsername(signupUser.value);
    const email = signupEmail.value.trim();
    const password = signupPass.value.trim();
    if(!username || !email || !password){ signupError.textContent="Tous les champs sont requis"; return; }

    await createUserWithEmailAndPassword(auth,email,password);
    localStorage.setItem("username", username);
  }catch(e){ signupError.textContent=e.message; }
});
</script>

</body>
</html>
