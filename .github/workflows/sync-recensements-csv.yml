name: Sync Recensements CSV

on:
  workflow_dispatch:
    inputs:
      source_event_id:
        description: "Event ID ayant déclenché la synchronisation"
        required: false
        type: string
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  sync-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Export Firestore recensements to CSV
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: npm run sync:recensements-csv

      - name: Commit CSV update
        run: |
          if git diff --quiet -- data/recensements.csv; then
            echo "Aucune mise à jour du CSV."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/recensements.csv
          git commit -m "Update recensements CSV"
          git push
