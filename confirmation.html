<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observation enregistrée</title>
<style>
  body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family: Arial, sans-serif;
    background: #f7f9f7;
    flex-direction: column;
    text-align:center;
  }
  h1 {
    color: #4CAF50;
    font-size:2em;
    margin-bottom:12px;
    animation: fadeIn 2s ease-in-out;
  }
  p {
    font-size:1.2em;
    color:#333;
    animation: fadeIn 2s ease-in-out 0.5s;
    animation-fill-mode: forwards;
    opacity:0;
  }
  @keyframes fadeIn {
    from {opacity:0; transform: translateY(-20px);}
    to {opacity:1; transform: translateY(0);}
  }

  .hedgehog {
    font-size:3em;
    animation: bounce 1.5s infinite;
    margin-bottom:20px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0);}
    50% { transform: translateY(-15px);}
  }

  .back-box {
    display:flex;
    justify-content:center;
    margin:0 0 20px;
  }
  a {
    display:inline-block;
    padding:10px 18px;
    background-color:white;
    color:#2f4f2f;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    border:2px solid #d9e6d9;
    box-shadow:0 3px 10px rgba(0,0,0,0.06);
    transition: background 0.3s;
  }
  a:hover { background-color:#f1f7f1; }
</style>
</head>
<body>
  <div class="hedgehog">🦔</div>
  <h1>Votre recensement a été enregistré !</h1>
  <div class="back-box"><a href="index.html">Retour à l'accueil</a></div>
  <p>Merci pour votre contribution à la protection des hérissons.</p>
</body>
</html>
